<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: transparent;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.logo-wrap {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
}

/* ============================
   STAR GROWTH — change this:
   1 = subtle, 2 = moderate, 3 = bold, 4 = dramatic
   ============================ */
:root { --star-scale: 1.65; }

.star, .star-dot {
  transform-box: fill-box;
  transform-origin: center;
}

.star     { animation: pulse-star 2.4s ease-in-out infinite; }
.star-dot { animation: pulse-dot 2s ease-in-out infinite; }

.star-lg  { animation-delay: 0s; }
.star-md  { animation-delay: 0.6s; }
.star-sm  { animation-delay: 1.2s; }

.star-dot-a { animation-delay: 0.2s; }
.star-dot-b { animation-delay: 0.9s; }
.star-dot-c { animation-delay: 1.6s; }
.star-dot-d { animation-delay: 0.5s; }
.star-dot-e { animation-delay: 1.1s; }
.star-dot-f { animation-delay: 1.8s; }

@keyframes pulse-star {
  0%, 100% { transform: scale(1); opacity: 0.85; }
  50%       { transform: scale(var(--star-scale)); opacity: 1; }
}

@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50%       { transform: scale(var(--star-scale)); opacity: 1; }
}
</style>
</head>
